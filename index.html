<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majestic Admin</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; text-align: center; }
    .success { color: #22c55e; font-size: 24px; }
  </style>
</head>
<body>
  <h1>Majestic Admin</h1>

  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    if (params.has('username')) {
      document.body.innerHTML += `<h2 class="success">✅ Добро пожаловать, ${params.get('username')}!</h2>`;
    } else {
      document.body.innerHTML += `<button onclick="window.location.href='https://majestic-admin-backend.onrender.com/login'" style="padding:15px 30px; font-size:18px; background:#5865F2; color:white; border:none; border-radius:10px; cursor:pointer;">Войти через Discord</button>`;
    }
  </script>
</body>
</html>
