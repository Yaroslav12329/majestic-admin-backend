<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Test</title>
  <style>body {background:#0f172a;color:white;padding:50px;font-family:Arial;text-align:center;}</style>
</head>
<body>
  <h1>Тест авторизации</h1>
  <button onclick="login()" style="padding:15px 30px;font-size:18px;background:#5865F2;color:white;border:none;border-radius:10px;">Войти через Discord</button>
  
  <div id="status" style="margin-top:30px;font-size:18px;"></div>

  <script>
    function login() {
      window.location.href = "https://majestic-admin-backend.onrender.com/login";
    }

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const status = document.getElementById('status');
      
      if (params.has('username')) {
        status.innerHTML = `<span style="color:#22c55e">✅ Успешно! Ник: ${params.get('username')}</span>`;
      } else if (params.has('error')) {
        status.innerHTML = `❌ Ошибка авторизации`;
      } else if (window.location.search) {
        status.innerHTML = `Code пришёл, но username нет.<br>URL: ${window.location.href}`;
      }
    };
  </script>
</body>
</html>
