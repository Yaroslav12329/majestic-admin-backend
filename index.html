<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 50px; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; background: #5865F2; color: white; border: none; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>Тест авторизации</h1>
  <button onclick="login()">Войти через Discord</button>
  
  <div id="debug" style="margin-top: 30px; font-size: 18px;"></div>

  <script>
    function login() {
      window.location.href = "https://majestic-admin-backend.onrender.com/login";
    }

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const debugDiv = document.getElementById('debug');

      if (params.has('username')) {
        debugDiv.innerHTML = `<span style="color:#22c55e">✅ УСПЕШНО!<br>Ник: ${params.get('username')}</span>`;
      } else if (window.location.search) {
        debugDiv.innerHTML = `Параметры пришли, но username нет.<br>URL: ${window.location.href}`;
      } else {
        debugDiv.innerHTML = `Это стартовая страница`;
      }
    };
  </script>
</body>
</html>
